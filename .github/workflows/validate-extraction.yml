name: Validate Extraction Scripts

on:
  push:
    paths:
      - 'experiments/**'
      - '.github/workflows/validate-extraction.yml'
  pull_request:
    paths:
      - 'experiments/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Check syntax
        run: |
          find experiments -name "*.py" -exec python -m py_compile {} +

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 experiments/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 experiments/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
